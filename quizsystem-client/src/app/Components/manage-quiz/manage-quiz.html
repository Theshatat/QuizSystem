<!-- quiz-management.component.html -->
<div class="management-container">
  @if (quiz()) {
    <!-- Quiz Overview Section -->
    <div class="overview-card">
      <div class="overview-header">
        <div class="title-section">
          <h1 class="quiz-main-title">{{ quiz()!.title }}</h1>
          <p class="quiz-main-description">{{ quiz()!.description }}</p>
        </div>
        <div class="overview-actions">
          <a [routerLink]="['/quizzes', quizId, 'edit']" class="btn btn-edit-quiz">
            <span class="icon">✏️</span> Edit Details
          </a>
          <button (click)="deleteQuiz()" class="btn btn-delete-quiz">
            <span class="icon">🗑️</span> Delete Quiz
          </button>
        </div>
      </div>
    </div>

    <!-- Questions Management Section -->
    <div class="questions-section">
      <div class="section-header">
        <h2 class="section-title">Questions List</h2>
        <span class="question-count">{{ quiz()!.questions.length }} Questions Total</span>
      </div>

      <div class="questions-list">
        @for (question of quiz()!.questions; track question.id; let i = $index) {
          <div class="question-row-card">
            <div class="question-number">#{{ i + 1 }}</div>
            <div class="question-content">
              <p class="question-text">{{ question.text }}</p>
            </div>
            <div class="row-actions">
              <a [routerLink]="['/questions', question.id, 'edit']" class="action-link edit-link">
                <span class="icon">📝</span> Edit
              </a>
              <button (click)="deleteQuestion(question.id)" class="action-link delete-link">
                <span class="icon">❌</span> Delete
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
